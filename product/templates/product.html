<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Add Product Form</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: red;
            padding: 20px;
        }

        .form-container {
            width: 100%;
            max-width: 550px;
            background: white;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .form-container h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
            font-size: 32px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 15px;
            font-weight: bold;
            color: #444;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #ccc;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.4);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #5a67d8;
            transform: scale(1.02);
        }

        /* Tablet */
        @media (max-width: 768px) {

            .form-container {
                padding: 28px;
            }

            .form-container h1 {
                font-size: 28px;
            }

            .input-group input,
            .input-group textarea {
                padding: 12px;
                font-size: 15px;
            }

            .btn {
                font-size: 16px;
            }
        }

        /* Mobile */
        @media (max-width: 480px) {

            body {
                padding: 15px;
            }

            .form-container {
                padding: 22px;
                border-radius: 14px;
            }

            .form-container h1 {
                font-size: 24px;
                margin-bottom: 20px;
            }

            .input-group {
                margin-bottom: 15px;
            }

            .input-group label {
                font-size: 14px;
            }

            .input-group input,
            .input-group textarea {
                padding: 11px;
                font-size: 14px;
                border-radius: 8px;
            }

            textarea {
                min-height: 100px;
            }

            .btn {
                padding: 13px;
                font-size: 15px;
                border-radius: 8px;
            }
        }
    </style>
</head>

<body>

    <div class="form-container">

        <h1>Add Product</h1>

        <form method="POST">

            {% csrf_token %}

          <div class="input-group">
                <label>Product Id</label>
                <input type="Number" name="id" placeholder="Enter product id" required>
            </div>

            <div class="input-group">
                <label>Product Name</label>
                <input type="text" name="name" placeholder="Enter product name" required>
            </div>

            <div class="input-group">
                <label>Price</label>
                <input type="number" step="0.01" name="price" placeholder="Enter price" required>
            </div>

            <div class="input-group">
                <label>Stock</label>
                <input type="number" name="stock" placeholder="Enter stock quantity" required>
            </div>

            <div class="input-group">
                <label>Category</label>
                <input type="text" name="category" placeholder="Enter category" required>
            </div>





            <button type="submit" class="btn">
                Add Product
            </button>

        </form>

    </div>

</body>

</html>
